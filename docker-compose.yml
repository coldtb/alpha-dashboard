services:
  # ── Frontend: React Dashboard (Nginx) ──────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend: Trading Bot (Node.js cron) ────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - NODE_ENV=production
      - HYPERLIQUID_PRIVATE_KEY=${HYPERLIQUID_PRIVATE_KEY}
      - HYPERLIQUID_WALLET_ADDRESS=${HYPERLIQUID_WALLET_ADDRESS}
      - TN_FINANCIAL_DATA_API_KEY=${TN_FINANCIAL_DATA_API_KEY}
      - NANSEN_API_KEY=${NANSEN_API_KEY}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - CRON_SECRET=${CRON_SECRET}
      - DRY_RUN=${DRY_RUN:-false}
    volumes:
      - ./config.json:/app/config.json:ro
      - bot_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  bot_logs:
